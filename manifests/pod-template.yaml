# Template Pod untuk satu kali run solver.
#
# PENTING — syarat Guaranteed QoS (wajib untuk kebijakan CPU Manager `static`):
#   1. requests.cpu HARUS SAMA dengan limits.cpu — untuk SEMUA container (termasuk init)
#   2. requests.memory HARUS SAMA dengan limits.memory — untuk SEMUA container (termasuk init)
#   3. Nilai CPU container solver HARUS INTEGER (mis. "2", bukan "2.5" atau "2500m")
# Pod ini akan dipakai untuk KEDUA kondisi (none dan static) — yang membedakan
# hasil HANYA kebijakan cpuManagerPolicy di kubelet node, bukan manifest Pod.
# Mengubah manifest Pod antar kondisi akan merusak validitas perbandingan.
#
# Placeholder yang diisi otomatis oleh scripts/run_experiment.sh sebelum
# `kubectl apply`: __RUN_ID__, __CONDITION__, __INSTANCE_FILE__, __CPU_COUNT__
apiVersion: v1
kind: Pod
metadata:
  name: solver-__RUN_ID__
  namespace: crossover-experiment
  labels:
    app: crossover-solver
    condition: "__CONDITION__"
    run-id: "__RUN_ID__"
spec:
  restartPolicy: Never
  # Tidak ada nodeSelector/affinity karena ini cluster single-node;
  # di cluster multi-node, WAJIB ditambahkan nodeName/nodeSelector
  # agar Pod kedua kondisi konsisten berjalan di node yang identik.
  initContainers:
    - name: copy-instance
      # Menggunakan tag versi stabil busybox untuk menghindari isu resolving digest
      # media-type mismatch di containerd.
      image: busybox:1.36
      imagePullPolicy: IfNotPresent
      command:
        - sh
        - -c
        - "cp /app/host-instances/__INSTANCE_FILE__ /app/instances/__INSTANCE_FILE__"
      volumeMounts:
        - name: host-instances
          mountPath: /app/host-instances
          readOnly: true
        - name: instances-tmpfs
          mountPath: /app/instances
      resources:
        requests:
          cpu: "10m"
          memory: "512Mi"
        limits:
          cpu: "10m"
          memory: "512Mi"
  containers:
    - name: solver
      image: crossover-experiment/gurobi-solver:latest
      imagePullPolicy: IfNotPresent
      command:
        - sh
        - -c
        - |
          python /app/run_solver.py \
            --instance=/app/instances/__INSTANCE_FILE__ \
            --condition=__CONDITION__ \
            --run-id=__RUN_ID__ \
            --output-dir=/app/results \
            --threads=__CPU_COUNT__
          EXIT_CODE=$?
          cp -a /app/results/. /mnt/host-results/ || true
          exit $EXIT_CODE
      env:
        - name: GRB_WLSACCESSID
          valueFrom:
            secretKeyRef:
              name: gurobi-wls-credentials
              key: GRB_WLSACCESSID
        - name: GRB_WLSSECRET
          valueFrom:
            secretKeyRef:
              name: gurobi-wls-credentials
              key: GRB_WLSSECRET
        - name: GRB_LICENSEID
          valueFrom:
            secretKeyRef:
              name: gurobi-wls-credentials
              key: GRB_LICENSEID
      resources:
        requests:
          cpu: "__CPU_COUNT__"
          memory: "24Gi"
        limits:
          cpu: "__CPU_COUNT__"
          memory: "24Gi"
      volumeMounts:
        - name: instances-tmpfs
          mountPath: /app/instances
        - name: results-tmpfs
          mountPath: /app/results
        - name: results-host
          mountPath: /mnt/host-results
  volumes:
    - name: host-instances
      hostPath:
        path: /mnt/experiment-data/instances
        type: Directory
    - name: instances-tmpfs
      emptyDir:
        medium: Memory
        sizeLimit: "512Mi"
    - name: results-tmpfs
      emptyDir:
        medium: Memory
        sizeLimit: "512Mi"
    - name: results-host
      hostPath:
        path: /mnt/experiment-data/results
        type: DirectoryOrCreate
