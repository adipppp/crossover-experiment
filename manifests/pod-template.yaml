# Template Pod untuk satu kali run solver.
#
# PENTING — syarat Guaranteed QoS (wajib untuk kebijakan CPU Manager `static`):
#   1. requests.cpu HARUS SAMA dengan limits.cpu — untuk SEMUA container (termasuk init)
#   2. requests.memory HARUS SAMA dengan limits.memory — untuk SEMUA container (termasuk init)
#   3. Nilai CPU container solver dan initContainer HARUS INTEGER (mis. "2", bukan "2.5" atau "2500m") jika ingin mendapat pinning di bawah `static`
# Pod ini akan dipakai untuk KEDUA kondisi (none dan static) — yang membedakan
# hasil HANYA kebijakan cpuManagerPolicy di kubelet node, bukan manifest Pod.
# Mengubah manifest Pod antar kondisi akan merusak validitas perbandingan.
#
# Placeholder yang diisi otomatis oleh scripts/run_experiment.sh sebelum
# `kubectl apply`: __RUN_ID__, __CONDITION__, __INSTANCE_FILE__, __CPU_COUNT__
#
# Catatan desain:
#   File instance di-copy dari hostPath ke emptyDir (tmpfs) menggunakan initContainer
#   sebelum solver berjalan. Ini menjamin I/O saat membaca file instance terjadi
#   murni di RAM, menghilangkan voluntary context switches akibat disk read (sesuai
#   proposal metodologi). Risikonya adalah OOM jika instance sangat besar, namun
#   batas 24Gi sangat mencukupi untuk benchmark Mittelmann.
apiVersion: v1
kind: Pod
metadata:
  name: solver-__RUN_ID__
  namespace: crossover-experiment
  labels:
    app: crossover-solver
    condition: "__CONDITION__"
    run-id: "__RUN_ID__"
spec:
  restartPolicy: Never
  # Tidak ada nodeSelector/affinity karena ini cluster single-node;
  # di cluster multi-node, WAJIB ditambahkan nodeName/nodeSelector
  # agar Pod kedua kondisi konsisten berjalan di node yang identik.
  initContainers:
    - name: stage-instance
      image: alpine:3.19
      command:
        - sh
        - -c
        - "cp /mnt/host-instances/__INSTANCE_FILE__ /app/instances/__INSTANCE_FILE__"
      resources:
        requests:
          cpu: "1"
          memory: "24Gi"
        limits:
          cpu: "1"
          memory: "24Gi"
      volumeMounts:
        - name: host-instances
          mountPath: /mnt/host-instances
          readOnly: true
        - name: mem-instances
          mountPath: /app/instances
  containers:
    - name: solver
      image: crossover-experiment/gurobi-solver:v1.0.0
      imagePullPolicy: IfNotPresent
      command:
        - python
        - /app/run_solver.py
        - --instance=/app/instances/__INSTANCE_FILE__
        - --condition=__CONDITION__
        - --run-id=__RUN_ID__
        - --output-dir=/app/results
        - --threads=__CPU_COUNT__
      securityContext:
        runAsUser: 1001
        runAsGroup: 1002
      env:
        - name: GRB_WLSACCESSID
          valueFrom:
            secretKeyRef:
              name: gurobi-wls-credentials
              key: GRB_WLSACCESSID
        - name: GRB_WLSSECRET
          valueFrom:
            secretKeyRef:
              name: gurobi-wls-credentials
              key: GRB_WLSSECRET
        - name: GRB_LICENSEID
          valueFrom:
            secretKeyRef:
              name: gurobi-wls-credentials
              key: GRB_LICENSEID
      resources:
        requests:
          cpu: "__CPU_COUNT__"
          memory: "24Gi"
        limits:
          cpu: "__CPU_COUNT__"
          memory: "24Gi"
      volumeMounts:
        - name: mem-instances
          mountPath: /app/instances
          readOnly: true
        - name: results-host
          mountPath: /app/results
  volumes:
    - name: host-instances
      hostPath:
        path: /mnt/experiment-data/instances
        type: Directory
    - name: mem-instances
      emptyDir:
        medium: Memory
    - name: results-host
      hostPath:
        path: /mnt/experiment-data/results
        type: DirectoryOrCreate
