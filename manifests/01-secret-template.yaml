# PERINGATAN: file ini hanya TEMPLATE. JANGAN isi nilai asli WLSACCESSID/
# WLSSECRET/LICENSEID di sini dan JANGAN commit file hasil isian ke git manapun
# (termasuk repo privat skripsi Anda) — kredensial WLS setara password.
#
# Cara membuat secret yang aman: gunakan perintah `kubectl create secret`
# langsung dari terminal (lihat scripts/setup_vm.sh langkah 7), BUKAN dengan
# `kubectl apply -f` file YAML yang berisi kredensial asli.
#
# File ini disimpan hanya sebagai REFERENSI struktur data yang dibutuhkan.
apiVersion: v1
kind: Secret
metadata:
  name: gurobi-wls-credentials
  namespace: crossover-experiment
type: Opaque
stringData:
  GRB_WLSACCESSID: "<ISI_VIA_KUBECTL_CREATE_SECRET_BUKAN_DI_SINI>"
  GRB_WLSSECRET: "<ISI_VIA_KUBECTL_CREATE_SECRET_BUKAN_DI_SINI>"
  GRB_LICENSEID: "<ISI_VIA_KUBECTL_CREATE_SECRET_BUKAN_DI_SINI>"
