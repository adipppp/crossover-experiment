# Template — JANGAN salin file ini langsung ke /var/lib/kubelet/config.yaml.
# Jalankan scripts/render_kubelet_configs.py (§1.7.5) terlebih dahulu.
# Hasil render tersimpan di kubelet-configs/rendered/condition-B-static.yaml.
#
# Placeholder yang diisi oleh render_kubelet_configs.py:
#   __RESERVED_SYSTEM_CPUS__ : ID vCPU tunggal yang direservasi untuk daemon
#                              sistem dan Kubernetes (ditentukan berdasarkan
#                              topologi aktual VM — lihat infra/topology-report.json).
#
# Catatan desain — cpuManagerPolicyOptions:
#   Opsi full-pcpus-only=true SENGAJA tidak disertakan sebagai konfigurasi
#   utama (sesuai Subbab "Karakterisasi Topologi Hardware" dalam proposal).
#   Pemilihan core manual via reservedSystemCPUs (dari characterize_topology.py)
#   sudah cukup untuk menghindari sibling pair. full-pcpus-only=true juga
#   menjadi tidak relevan pada Option 2 (SMT off) karena sibling pair tidak ada.
#   Jika di kemudian hari full-pcpus-only=true ingin diaktifkan sebagai
#   sensitivitas tambahan, tambahkan secara eksplisit setelah render.
apiVersion: kubelet.config.k8s.io/v1beta1
authentication:
  anonymous:
    enabled: false
  webhook:
    cacheTTL: 0s
    enabled: true
  x509:
    clientCAFile: /etc/kubernetes/pki/ca.crt
authorization:
  mode: Webhook
  webhook:
    cacheAuthorizedTTL: 0s
    cacheUnauthorizedTTL: 0s
cgroupDriver: systemd
clusterDNS:
- 10.96.0.10
clusterDomain: cluster.local
containerRuntimeEndpoint: unix:///var/run/containerd/containerd.sock
cpuManagerReconcilePeriod: 10s  # default — no change from proposal baseline
cpuManagerPolicy: static
crashLoopBackOff: {}
evictionPressureTransitionPeriod: 0s
fileCheckFrequency: 20s
healthzBindAddress: 127.0.0.1
healthzPort: 10248
httpCheckFrequency: 20s
imageMaximumGCAge: 0s
imageMinimumGCAge: 0s
kind: KubeletConfiguration
logging:
  flushFrequency: 0
  options:
    json:
      infoBufferSize: "0"
    text:
      infoBufferSize: "0"
  verbosity: 0
memorySwap: {}
nodeStatusReportFrequency: 5m
nodeStatusUpdateFrequency: 10s
resolvConf: /run/systemd/resolve/resolv.conf
rotateCertificates: true
runtimeRequestTimeout: 0s
shutdownGracePeriod: 0s
shutdownGracePeriodCriticalPods: 0s
staticPodPath: /etc/kubernetes/manifests
streamingConnectionIdleTimeout: 0s
syncFrequency: 1m
volumeStatsAggPeriod: 0s
systemReserved:
  cpu: "500m"
  memory: "512Mi"
kubeReserved:
  cpu: "500m"
  memory: "512Mi"
reservedSystemCPUs: "__RESERVED_SYSTEM_CPUS__"
